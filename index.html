<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TISS SSE | Arrival Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-emerald: #065f46;
            --gold-gradient: linear-gradient(to bottom, #cfb53b 0%, #f7ef8a 50%, #ae8625 100%);
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        .gold-brand {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-curve {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            border-bottom: 4px solid #fbbf24;
        }

        .glass-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Present / Absentia row coloring */
        .row-present { background-color: #f0fdf4 !important; } 
        .row-absentia { background-color: #fef2f2 !important; } 
        .row-present:hover { background-color: #dcfce7 !important; }
        .row-absentia:hover { background-color: #fee2e2 !important; }

        /* Confirm Button Styles */
        .btn-confirm { @apply border-2 border-slate-300 text-slate-500 hover:bg-slate-100 transition-all duration-200; }
        .btn-confirm.active { 
            @apply bg-blue-600 border-blue-700 text-white scale-105; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); 
        }

        /* Summary Card Borders */
        .stat-total { border-top: 4px solid #64748b; }
        .stat-present { border-top: 4px solid #10b981; }
        .stat-absent { border-top: 4px solid #ef4444; }
        .stat-arrived { border-top: 4px solid #2563eb; }
        .stat-guardians { border-top: 4px solid #f59e0b; }

        /* Back to Top Button */
        #backToTop {
            position: fixed; bottom: 30px; right: 30px;
            display: none; background: #065f46; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; z-index: 1000; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #backToTop:hover { background: #047857; transform: translateY(-5px); }

        #toast { 
            visibility: hidden; min-width: 250px; background-color: #1e293b; color: white; 
            text-align: center; border-radius: 50px; padding: 16px; position: fixed; 
            z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); 
            font-weight: 700;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-10">

    <header class="header-curve py-10 px-4 text-center mb-16">
        <h1 class="text-white text-2xl md:text-5xl font-extrabold uppercase mb-2 tracking-tight">
            <span class="gold-brand">Tata Institute Of Social Sciences</span>
        </h1>
        <p class="text-emerald-100 text-xs md:text-lg font-medium opacity-80 uppercase tracking-widest">
            SSE Convocation Arrival Management
        </p>
    </header>

    <main class="max-w-[1600px] mx-auto px-4">
        
        <!-- Summary Cards (5 Columns) -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-10 -mt-20 relative z-10">
            <div class="glass-card p-6 stat-total">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Students</p>
                <h4 id="statTotal" class="text-3xl font-extrabold text-slate-800">0</h4>
            </div>
            <div class="glass-card p-6 stat-present">
                <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Data: Present</p>
                <h4 id="statPresent" class="text-3xl font-extrabold text-emerald-600">0</h4>
            </div>
            <div class="glass-card p-6 stat-absent">
                <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Data: Absentia</p>
                <h4 id="statAbsent" class="text-3xl font-extrabold text-red-600">0</h4>
            </div>
            <div class="glass-card p-6 stat-arrived">
                <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Confirmed Arrivals</p>
                <h4 id="statConfirmed" class="text-3xl font-extrabold text-blue-600">0</h4>
            </div>
            <div class="glass-card p-6 stat-guardians">
                <p class="text-[10px] font-bold text-amber-500 uppercase tracking-widest">Total Guardians</p>
                <h4 id="statGuardians" class="text-3xl font-extrabold text-amber-600">0</h4>
            </div>
        </div>

        <!-- Controls -->
        <div class="glass-card p-4 mb-8 flex flex-col lg:flex-row items-center gap-4 sticky top-4 z-50 shadow-xl">
            <div class="relative flex-grow w-full">
                <input type="text" id="searchInput" oninput="toggleX()" class="w-full pl-12 pr-12 py-4 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-slate-700 transition-all" placeholder="Search by Name, UID or Hub...">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 pointer-events-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <!-- X Button to clear search -->
                <button id="clearSearch" onclick="clearSearchText()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-red-500 hidden">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 001.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
                </button>
            </div>

            <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                <select id="statusFilter" onchange="render()" class="bg-slate-50 border border-slate-200 px-4 py-4 rounded-xl font-bold text-slate-600 outline-none text-sm min-w-[200px] cursor-pointer">
                    <option value="all">All Records</option>
                    <option value="yes">Status: Present</option>
                    <option value="no">Status: Absentia</option>
                    <option value="arrived">Arrival: Confirmed</option>
                    <option value="not_arrived">Arrival: Pending</option>
                </select>
                <button onclick="exportData()" class="bg-emerald-700 hover:bg-emerald-800 text-white px-6 py-4 rounded-xl font-bold text-sm transition-all shadow-lg active:scale-95">
                    Download Excel
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="glass-card overflow-hidden shadow-2xl bg-white">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200">
                            <th class="px-6 py-5 text-[11px] font-black text-slate-500 uppercase">S.No</th>
                            <th class="px-6 py-5 text-[11px] font-black text-slate-500 uppercase">Student Profile</th>
                            <th class="px-6 py-5 text-[11px] font-black text-slate-500 uppercase">Hub Center</th>
                            <th class="px-6 py-5 text-[11px] font-black text-slate-500 uppercase text-center">Data Status</th>
                            <th class="px-6 py-5 text-[11px] font-black text-slate-500 uppercase text-center">Confirm Arrival</th>
                            <th class="px-6 py-5 text-[11px] font-black text-slate-500 uppercase text-center">Guardians</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </main>

        let students = JSON.parse(localStorage.getItem('tiss_arrival_final_v2')) || [];

        function initData() {
            if (rawData.length > 0) {
                const existingIds = new Set(students.map(s => s.uid));
                rawData.forEach((item, idx) => {
                    const uid = item["Universal Student ID"] || `ID-${idx}`;
                    if (!existingIds.has(uid)) {
                        students.push({
                            id: uid + Math.random(), 
                            uid: uid,
                            name: item["Name of Student"],
                            course: item["Course Name"],
                            hub: item["Hub Name"],
                            status: item["Present / Absentia"] === "Present" ? "yes" : "no",
                            confirmed: false,
                            guardians: 0
                        });
                    }
                });
                save();
            }
        }

        function save() {
            localStorage.setItem('tiss_arrival_final_v2', JSON.stringify(students));
            updateStats();
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = students.length;
            document.getElementById('statPresent').innerText = students.filter(x => x.status === 'yes').length;
            document.getElementById('statAbsent').innerText = students.filter(x => x.status === 'no').length;
            document.getElementById('statConfirmed').innerText = students.filter(x => x.confirmed).length;
            const totalGuards = students.reduce((acc, curr) => acc + (parseInt(curr.guardians) || 0), 0);
            document.getElementById('statGuardians').innerText = totalGuards;
        }

        function toggleX() {
            const input = document.getElementById('searchInput');
            const xBtn = document.getElementById('clearSearch');
            xBtn.style.display = input.value.length > 0 ? 'flex' : 'none';
            render();
        }

        function clearSearchText() {
            document.getElementById('searchInput').value = '';
            toggleX();
        }

        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('statusFilter').value;
            const tableBody = document.getElementById('tableBody');
            
            const filtered = students.filter(s => {
                const matchesSearch = (s.name || "").toLowerCase().includes(query) || 
                                     (s.uid || "").toLowerCase().includes(query) || 
                                     (s.hub || "").toLowerCase().includes(query);
                
                let matchesFilter = true;
                if (filter === 'yes' || filter === 'no') matchesFilter = s.status === filter;
                if (filter === 'arrived') matchesFilter = s.confirmed === true;
                if (filter === 'not_arrived') matchesFilter = s.confirmed === false;
                
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400 font-bold">No records found.</td></tr>`;
                return;
            }

            tableBody.innerHTML = filtered.map((s, index) => {
                const rowClass = s.status === 'yes' ? 'row-present' : 'row-absentia';
                return `
                <tr class="${rowClass} transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-500 text-xs">${index + 1}</td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-bold text-slate-800">${s.name}</div>
                        <div class="text-[10px] font-mono text-slate-500 uppercase mt-0.5">UID: ${s.uid}</div>
                    </td>
                    <td class="px-6 py-4 text-[11px] font-semibold text-slate-500 italic max-w-[200px] truncate">${s.hub}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase border ${s.status === 'yes' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-red-100 text-red-700 border-red-200'}">
                            ${s.status === 'yes' ? 'Present' : 'Absentia'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="toggleArrival('${s.id}')" 
                                class="btn-confirm px-5 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider ${s.confirmed ? 'active' : ''}">
                            ${s.confirmed ? '✓ Arrived' : 'Confirm'}
                        </button>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <input type="number" min="0" value="${s.guardians || ''}" placeholder="0"
                               onkeydown="if(event.key==='Enter') { this.blur(); }"
                               onchange="setGuardians('${s.id}', this.value)" 
                               class="w-14 py-2 bg-white border border-slate-300 focus:border-blue-500 rounded-lg text-center font-bold text-sm outline-none">
                    </td>
                </tr>`;
            }).join('');
            updateStats();
        }

        function toggleArrival(id) {
            const s = students.find(x => x.id === id);
            if (s) {
                s.confirmed = !s.confirmed;
                save();
                render();
                if(s.confirmed) showToast(`Arrival confirmed for ${s.name}`);
            }
        }

        function setGuardians(id, val) {
            const s = students.find(x => x.id === id);
            if (s) {
                s.guardians = parseInt(val) || 0;
                save();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.className = "show";
            setTimeout(() => t.className = "", 2500);
        }

        function exportData() {
            const exportDataArray = [
                ["TISS SSE CONVOCATION ARRIVAL REPORT"],
                ["Category", "Count"],
                ["Total Records", students.length],
                ["Data Status: Present", students.filter(x => x.status === 'yes').length],
                ["Data Status: Absentia", students.filter(x => x.status === 'no').length],
                ["Actual Confirmed Arrivals", students.filter(x => x.confirmed).length],
                ["Total Guardians", students.reduce((acc, curr) => acc + (parseInt(curr.guardians) || 0), 0)],
                [],
                ["S.No", "UID", "Student Name", "Hub", "Course", "Status", "Arrived", "Guardians"]
            ];
            students.forEach((s, i) => exportDataArray.push([i+1, s.uid, s.name, s.hub, s.course, s.status==='yes'?'PRESENT':'ABSENTIA', s.confirmed?'YES':'NO', s.guardians]));
            const ws = XLSX.utils.aoa_to_sheet(exportDataArray);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "TISS_Arrival_Report.xlsx");
        }

        // Scroll Logic
        window.onscroll = function() {
            const btn = document.getElementById("backToTop");
            btn.style.display = (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) ? "flex" : "none";
        };
        function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }

        initData();
        render();
    </script>
